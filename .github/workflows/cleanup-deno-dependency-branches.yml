name: Cleanup Deno Dependency Branches

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    name: Remove orphaned dependency branches
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete orphaned chore/deno-dependencies branches
        uses: actions/github-script@v9
        with:
          script: |
            const prefix = 'chore/deno-dependencies';
            const pr = context.payload.pull_request;

            if (pr.base.ref !== 'main') {
              core.info(`Skipping: base branch is ${pr.base.ref}, expected main.`);
              return;
            }

            // Only run cleanup after a merged dependency-update PR.
            if (!pr.head.ref.startsWith(prefix)) {
              core.info(`Skipping: merged branch ${pr.head.ref} does not match ${prefix}*.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const matchingRefs = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `heads/${prefix}`,
            });

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const protectedHeads = new Set(openPulls.map((openPr) => openPr.head.ref));

            let deleted = 0;

            for (const ref of matchingRefs.data) {
              const branch = ref.ref.replace('refs/heads/', '');

              if (branch === 'main') continue;
              if (protectedHeads.has(branch)) {
                core.info(`Keeping ${branch}: branch is used by an open pull request.`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                core.info(`Deleted ${branch}`);
                deleted += 1;
              } catch (error) {
                core.warning(`Could not delete ${branch}: ${error.message}`);
              }
            }

            core.info(`Cleanup complete. Deleted ${deleted} branch(es).`);
